version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.1
      - DATABASE_URL=sqlite+aiosqlite:///./interview_prep.db
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    depends_on:
      - ollama
    deploy:
      resources:
        limits:
          memory: 1G        # Backend doesn't need much

  ollama:
    image: ollama/ollama:latest
    platform: linux/arm64  
    ports:
      - "11434:11434"
    environment: 
      - OLLAMA_KEEP_ALIVE=-1
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 8G        # Give Ollama the lion's share
        reservations:
          memory: 6G        # Guarantee at least 6GB

volumes:
  backend_data:
  ollama_data: